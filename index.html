<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>설문 관리자 페이지</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f7f7f9;
      color: #222;
    }

    .wrap {
      max-width: 1100px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 14px;
      padding: 20px;
      box-shadow: 0 4px 18px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    h1, h2 {
      margin-top: 0;
    }

    input {
      width: 100%;
      max-width: 360px;
      padding: 12px;
      margin-bottom: 10px;
      border: 1px solid #dcdcdc;
      border-radius: 8px;
      font-size: 14px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 8px;
      background: #111827;
      color: white;
      cursor: pointer;
      font-size: 14px;
    }

    button:hover {
      opacity: 0.92;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }

    .hidden {
      display: none;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      background: white;
    }

    th, td {
      border-bottom: 1px solid #e5e7eb;
      padding: 12px 10px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
    }

    th {
      background: #f3f4f6;
      position: sticky;
      top: 0;
    }

    .table-wrap {
      overflow-x: auto;
      border-radius: 12px;
    }

    .msg {
      margin-top: 10px;
      font-size: 14px;
    }

    .muted {
      color: #666;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>설문 관리자 페이지</h1>

    <div id="loginCard" class="card">
      <h2>관리자 로그인</h2>
      <input type="email" id="email" placeholder="이메일" />
      <br />
      <input type="password" id="password" placeholder="비밀번호" />
      <br />
      <button id="loginBtn">로그인</button>
      <div id="loginMsg" class="msg"></div>
    </div>

    <div id="adminSection" class="hidden">
      <div class="card">
        <div class="topbar">
          <div>
            <h2 style="margin-bottom: 4px;">응답 목록</h2>
            <div class="muted">최신 제출순으로 표시됩니다.</div>
          </div>
          <div>
            <button id="refreshBtn">새로고침</button>
            <button id="logoutBtn">로그아웃</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>제출시간</th>
                <th>Q1</th>
                <th>Q2</th>
                <th>Q3</th>
                <th>Q4</th>
                <th>Q5</th>
                <th>Q6</th>
              </tr>
            </thead>
            <tbody id="responseTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://ytnxmnbctujuopbqpurl.supabase.co";
    const supabaseKey = "sb_publishable_4oBm89ecivuVF6StOBz7yg_qNBItC4z";

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    const loginCard = document.getElementById("loginCard");
    const adminSection = document.getElementById("adminSection");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const loginMsg = document.getElementById("loginMsg");
    const tableBody = document.getElementById("responseTableBody");

    async function checkSession() {
      const { data, error } = await supabaseClient.auth.getSession();

      if (error) {
        console.error(error);
        return;
      }

      if (data.session) {
        loginCard.classList.add("hidden");
        adminSection.classList.remove("hidden");
        loadResponses();
      } else {
        loginCard.classList.remove("hidden");
        adminSection.classList.add("hidden");
      }
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        loginMsg.textContent = "로그인 실패: " + error.message;
        return;
      }

      loginMsg.textContent = "로그인 성공";
      await checkSession();
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      tableBody.innerHTML = "";
      checkSession();
    }

    async function loadResponses() {
      const { data, error } = await supabaseClient
        .from("survey_responses")
        .select("created_at, q1, q2, q3, q4, q5, q6")
        .order("created_at", { ascending: false });

      if (error) {
        console.error(error);
        alert("응답 조회 실패: " + error.message);
        return;
      }

      tableBody.innerHTML = "";

      if (!data || data.length === 0) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="7">저장된 응답이 없습니다.</td>
          </tr>
        `;
        return;
      }

      data.forEach(row => {
        const tr = document.createElement("tr");
        tr.innerHTML = `
          <td>${formatDate(row.created_at)}</td>
          <td>${escapeHtml(row.q1)}</td>
          <td>${escapeHtml(row.q2)}</td>
          <td>${escapeHtml(row.q3)}</td>
          <td>${escapeHtml(row.q4)}</td>
          <td>${escapeHtml(row.q5)}</td>
          <td>${escapeHtml(row.q6)}</td>
        `;
        tableBody.appendChild(tr);
      });
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      return d.toLocaleString("ko-KR");
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loginBtn.addEventListener("click", login);
    logoutBtn.addEventListener("click", logout);
    refreshBtn.addEventListener("click", loadResponses);

    checkSession();
  </script>
</body>
</html>
