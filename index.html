<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>설문 관리자 페이지</title>
  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      padding: 24px;
      font-family: Arial, sans-serif;
      background: #f6f7fb;
      color: #222;
    }

    .wrap {
      max-width: 1400px;
      margin: 0 auto;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 20px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.08);
      margin-bottom: 20px;
    }

    h1, h2 {
      margin-top: 0;
    }

    .hidden {
      display: none;
    }

    input {
      width: 100%;
      max-width: 360px;
      padding: 12px;
      border: 1px solid #d9dce3;
      border-radius: 10px;
      margin-bottom: 10px;
      font-size: 14px;
    }

    button {
      border: none;
      border-radius: 10px;
      padding: 10px 16px;
      cursor: pointer;
      font-size: 14px;
      background: #111827;
      color: #fff;
    }

    button:hover {
      opacity: 0.92;
    }

    .sub-btn {
      background: #2563eb;
      padding: 8px 12px;
      font-size: 13px;
      white-space: nowrap;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .muted {
      color: #666;
      font-size: 13px;
    }

    .msg {
      margin-top: 10px;
      font-size: 14px;
    }

    .table-wrap {
      overflow-x: auto;
      margin-top: 16px;
      border-radius: 12px;
      border: 1px solid #e5e7eb;
      background: #fff;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      min-width: 1400px;
    }

    th, td {
      border-bottom: 1px solid #edf0f5;
      padding: 12px 10px;
      text-align: left;
      vertical-align: top;
      font-size: 14px;
      line-height: 1.45;
    }

    th {
      background: #f8fafc;
      font-weight: 700;
      position: sticky;
      top: 0;
      z-index: 1;
    }

    .address-cell {
      min-width: 280px;
    }

    .coord-cell {
      min-width: 160px;
      color: #555;
      word-break: break-all;
    }

    .action-cell {
      min-width: 100px;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>설문 관리자 페이지</h1>

    <div id="loginCard" class="card">
      <h2>관리자 로그인</h2>
      <input type="email" id="email" placeholder="이메일" />
      <br />
      <input type="password" id="password" placeholder="비밀번호" />
      <br />
      <button id="loginBtn">로그인</button>
      <div id="loginMsg" class="msg"></div>
    </div>

    <div id="adminSection" class="hidden">
      <div class="card">
        <div class="topbar">
          <div>
            <h2 style="margin-bottom: 6px;">응답 목록</h2>
            <div class="muted">좌표(q7)를 주소로 변환해서 표시합니다.</div>
          </div>
          <div style="display:flex; gap:8px;">
            <button id="refreshBtn">새로고침</button>
            <button id="logoutBtn">로그아웃</button>
          </div>
        </div>

        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th>제출시간</th>
                <th>Q1</th>
                <th>Q2</th>
                <th>Q3</th>
                <th>Q4</th>
                <th>Q5</th>
                <th>Q6</th>
                <th>Q7 좌표</th>
                <th>주소</th>
                <th>지도</th>
              </tr>
            </thead>
            <tbody id="responseTableBody"></tbody>
          </table>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseUrl = "https://ytnxmnbctujuopbqpurl.supabase.co";
    const supabaseKey = "sb_publishable_4oBm89ecivuVF6StOBz7yg_qNBItC4z";
    const kakaoRestApiKey = "031976a908a7025af454fac04bb981c7";

    const supabaseClient = supabase.createClient(supabaseUrl, supabaseKey);

    const loginCard = document.getElementById("loginCard");
    const adminSection = document.getElementById("adminSection");
    const loginBtn = document.getElementById("loginBtn");
    const logoutBtn = document.getElementById("logoutBtn");
    const refreshBtn = document.getElementById("refreshBtn");
    const loginMsg = document.getElementById("loginMsg");
    const tableBody = document.getElementById("responseTableBody");

    async function checkSession() {
      const { data, error } = await supabaseClient.auth.getSession();

      if (error) {
        console.error("세션 확인 오류:", error);
        return;
      }

      if (data.session) {
        loginCard.classList.add("hidden");
        adminSection.classList.remove("hidden");
        await loadResponses();
      } else {
        loginCard.classList.remove("hidden");
        adminSection.classList.add("hidden");
      }
    }

    async function login() {
      const email = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value.trim();

      const { error } = await supabaseClient.auth.signInWithPassword({
        email,
        password
      });

      if (error) {
        loginMsg.textContent = "로그인 실패: " + error.message;
        return;
      }

      loginMsg.textContent = "로그인 성공";
      await checkSession();
    }

    async function logout() {
      await supabaseClient.auth.signOut();
      tableBody.innerHTML = "";
      checkSession();
    }

    async function loadResponses() {
      tableBody.innerHTML = `
        <tr>
          <td colspan="10">불러오는 중...</td>
        </tr>
      `;

      const { data, error } = await supabaseClient
        .from("survey_responses")
        .select("created_at, q1, q2, q3, q4, q5, q6, q7")
        .order("created_at", { ascending: false });

      if (error) {
        console.error("응답 조회 오류:", error);
        alert("응답 조회 실패: " + error.message);
        return;
      }

      if (!data || data.length === 0) {
        tableBody.innerHTML = `
          <tr>
            <td colspan="10">저장된 응답이 없습니다.</td>
          </tr>
        `;
        return;
      }

      const rowsHtml = await Promise.all(
        data.map(async (row) => {
          const parsed = parseQ7(row.q7);
          let addressText = "";

          if (parsed.valid) {
            try {
              addressText = await reverseGeocode(parsed.lng, parsed.lat);
            } catch (e) {
              console.error("주소 변환 오류:", e);
              addressText = "주소 변환 실패";
            }
          } else {
            addressText = row.q7 ? "좌표 형식 오류" : "";
          }

          return `
            <tr>
              <td>${formatDate(row.created_at)}</td>
              <td>${escapeHtml(row.q1)}</td>
              <td>${escapeHtml(row.q2)}</td>
              <td>${escapeHtml(row.q3)}</td>
              <td>${escapeHtml(row.q4)}</td>
              <td>${escapeHtml(row.q5)}</td>
              <td>${escapeHtml(row.q6)}</td>
              <td class="coord-cell">${escapeHtml(row.q7 || "")}</td>
              <td class="address-cell">${escapeHtml(addressText)}</td>
              <td class="action-cell">
                ${
                  parsed.valid
                    ? `<button class="sub-btn" onclick="openMap('${parsed.lng}', '${parsed.lat}')">위치확인</button>`
                    : ""
                }
              </td>
            </tr>
          `;
        })
      );

      tableBody.innerHTML = rowsHtml.join("");
    }

    function parseQ7(value) {
      if (!value) {
        return { valid: false, lng: "", lat: "" };
      }

      const parts = String(value).split(",").map(v => v.trim());
      if (parts.length !== 2) {
        return { valid: false, lng: "", lat: "" };
      }

      const first = Number(parts[0]);
      const second = Number(parts[1]);

      if (Number.isNaN(first) || Number.isNaN(second)) {
        return { valid: false, lng: "", lat: "" };
      }

      // 저장 포맷이 "위도,경도"로 들어온 경우 자동 보정
      if (Math.abs(first) <= 90 && Math.abs(second) <= 180) {
        return { valid: true, lat: String(first), lng: String(second) };
      }

      // 저장 포맷이 "경도,위도"인 경우
      if (Math.abs(first) <= 180 && Math.abs(second) <= 90) {
        return { valid: true, lng: String(first), lat: String(second) };
      }

      return { valid: false, lng: "", lat: "" };
    }

    async function reverseGeocode(lng, lat) {
      const url =
        `https://dapi.kakao.com/v2/local/geo/coord2address.json?x=${encodeURIComponent(lng)}&y=${encodeURIComponent(lat)}&input_coord=WGS84`;

      const res = await fetch(url, {
        headers: {
          Authorization: `KakaoAK ${kakaoRestApiKey}`
        }
      });

      if (!res.ok) {
        throw new Error("카카오 주소 변환 요청 실패");
      }

      const json = await res.json();
      const doc = json.documents && json.documents[0];

      if (!doc) {
        return "주소 없음";
      }

      return (
        doc.road_address?.address_name ||
        doc.address?.address_name ||
        "주소 없음"
      );
    }

    function openMap(lng, lat) {
      const mapUrl = `https://map.kakao.com/link/map/${encodeURIComponent(lat)},${encodeURIComponent(lng)}`;
      window.open(mapUrl, "_blank");
    }

    function formatDate(value) {
      if (!value) return "";
      const d = new Date(value);
      return d.toLocaleString("ko-KR");
    }

    function escapeHtml(value) {
      if (value === null || value === undefined) return "";
      return String(value)
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    loginBtn.addEventListener("click", login);
    logoutBtn.addEventListener("click", logout);
    refreshBtn.addEventListener("click", loadResponses);

    checkSession();
  </script>
</body>
</html>
